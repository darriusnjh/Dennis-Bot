services:
  dennis-bot:
    build:
      context: .
      dockerfile: Dockerfile
    image: dennis-bot:local
    restart: unless-stopped
    env_file:
      - path: .env.example
      - path: .env
        required: false
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      DATABASE_PATH: /app/data/dennis_bot.sqlite3
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - dennis_bot_data:/app/data
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  dennis_bot_data:
